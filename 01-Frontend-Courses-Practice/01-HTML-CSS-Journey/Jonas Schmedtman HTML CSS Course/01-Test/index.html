<!-- ============================================ -->
<!-- FIRST PAGE OF WEBSITE => index.html           -->
<!-- index.html is the default file that web servers-->
<!-- look for when a user visits a directory.        -->
<!-- For example: example.com/ loads index.html      -->
<!-- This is why it's called the "home page".         -->
<!-- ============================================ -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Specifies the character encoding (UTF-8 supports all languages) -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Makes the page responsive on mobile devices -->
    <!-- width=device-width = sets the page width to match the device screen -->
    <!-- initial-scale=1.0 = sets the initial zoom level to 100% -->

    <title>My first webpage!</title>
    <!-- The title appears in the browser tab -->
  </head>

  <body>
    <!-- BODY: All visible content goes here -->
    <!-- Everything inside the <body> tag is what the user sees in the browser window. -->

    <h1>Hello, World!</h1>
    <!-- <h1> is the most important heading (level 1) -->
    <!-- Used for the main title of the page -->
    <!-- Should only be used ONCE per page for SEO -->

    <p>My name ist Heliya. This is my very first webpage:D</p>
    <!-- <p> = paragraph element -->
    <!-- Used for blocks of text (paragraphs) -->
    <!-- Browsers automatically add spacing above and below paragraphs.-->
  </body>
</html>
